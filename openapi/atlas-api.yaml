openapi: 3.1.0
info:
  title: ATLAS API
  description: |
    API for ATLAS (Automated Tracking & Licensing Application System)
    Manages permit applications, documents, users, and audit logs.
  version: 1.0.0
  contact:
    name: ATLAS Development Team
    email: dev@atlas.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://localhost:5001
    description: Development server
  - url: https://api.atlas.example.com
    description: Production server

security:
  - EntraID: []

tags:
  - name: Applications
    description: Permit application management
  - name: Documents
    description: Document upload and download
  - name: PermitTypes
    description: Permit type configuration
  - name: Users
    description: User account management
  - name: AuditLogs
    description: Audit trail and compliance

paths:
  /api/applications:
    get:
      tags: [Applications]
      summary: Get all applications
      description: Retrieve a list of applications with optional filtering
      operationId: getApplications
      parameters:
        - name: citizenId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by citizen ID
        - name: officerId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by assigned officer ID
        - name: status
          in: query
          schema:
            type: string
          description: Filter by application status
        - name: permitTypeId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by permit type ID
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by submission date (from)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by submission date (to)
        - name: search
          in: query
          schema:
            type: string
          description: Search term for application number or citizen name
      responses:
        '200':
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen', 'Officer', 'Admin']
    
    post:
      tags: [Applications]
      summary: Submit new application
      description: Submit a new permit application
      operationId: submitApplication
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitApplicationRequest'
            examples:
              standardApplication:
                summary: Standard permit application
                value:
                  citizenId: '12345678-1234-1234-1234-123456789012'
                  permitTypeId: '87654321-4321-4321-4321-210987654321'
                  citizenNotes: 'Need permit for business operations'
      responses:
        '201':
          description: Application created successfully
          content:
            application/json:
              schema:
                type: string
                format: uuid
              example: '11111111-2222-3333-4444-555555555555'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen', 'Officer', 'Admin']

  /api/applications/{id}:
    get:
      tags: [Applications]
      summary: Get application by ID
      description: Retrieve detailed information about a specific application
      operationId: getApplicationById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Application ID
      responses:
        '200':
          description: Application details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen', 'Officer', 'Admin']

    put:
      tags: [Applications]
      summary: Update draft application
      description: Update a draft application's field values and notes
      operationId: updateDraft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Application ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDraftRequest'
      responses:
        '200':
          description: Draft updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSummaryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen']        

  /api/applications/{id}/approve:
    post:
      tags: [Applications]
      summary: Approve application
      description: Approve a pending permit application
      operationId: approveApplication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Application ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveApplicationRequest'
      responses:
        '200':
          description: Application approved successfully
          content:
            application/json:
              schema:
                type: boolean
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Officer', 'Admin']

  /api/applications/{id}/reject:
    post:
      tags: [Applications]
      summary: Reject application
      description: Reject a pending permit application
      operationId: rejectApplication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Application ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectApplicationRequest'
      responses:
        '200':
          description: Application rejected successfully
          content:
            application/json:
              schema:
                type: boolean
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Officer', 'Admin']

  /api/applications/{id}/request-info:
    post:
      tags: [Applications]
      summary: Request additional information
      description: Request additional information from citizen for a pending application
      operationId: requestInfo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Application ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestInfoRequest'
      responses:
        '200':
          description: Information request sent successfully
          content:
            application/json:
              schema:
                type: boolean
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Officer', 'Admin']

  /api/applications/{id}/assign:
    post:
      tags: [Applications]
      summary: Assign application to officer
      description: Assign a pending application to a specific officer
      operationId: assignToOfficer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Application ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignToOfficerRequest'
      responses:
        '200':
          description: Application assigned successfully
          content:
            application/json:
              schema:
                type: boolean
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Officer', 'Admin']

  /api/applications/{applicationId}/documents:
    post:
      tags: [Documents]
      summary: Upload document
      description: Upload a document for an application
      operationId: uploadDocument
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Application ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadDocumentRequest'
      responses:
        '200':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                type: boolean
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen', 'Officer', 'Admin']

  /api/applications/draft:
    post:
      tags: [Applications]
      summary: Create draft application
      description: Create a new draft permit application with field values
      operationId: createDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftRequest'
            examples:
              standardDraft:
                summary: Create a building permit draft
                value:
                  permitTypeId: '87654321-4321-4321-4321-210987654321'
                  citizenNotes: 'Building a new deck'
                  fieldValues:
                    - fieldName: ProjectTitle
                      value: 'Residential Deck Construction'
                      sortOrder: 1
                    - fieldName: PropertyAddress
                      value: '123 Main St'
                      sortOrder: 2
      responses:
        '201':
          description: Draft created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSummaryResponse'
              examples:
                draftCreated:
                  summary: Draft application response
                  value:
                    id: '11111111-2222-3333-4444-555555555555'
                    applicationNumber: 'APP-2026-0042'
                    status: Draft
                    submittedDate: null
                    citizenId: '12345678-1234-1234-1234-123456789012'
                    permitTypeId: '87654321-4321-4321-4321-210987654321'
                    citizenName: 'John Doe'
                    permitTypeName: 'Building Permit'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen']

  /api/applications/{id}/submit:
    post:
      tags: [Applications]
      summary: Submit draft application
      description: Submit a draft application for review
      operationId: submitDraft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Application ID
      responses:
        '200':
          description: Draft submitted successfully; status transitions from Draft to Submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSummaryResponse'
              examples:
                draftSubmitted:
                  summary: Submitted application response
                  value:
                    id: '11111111-2222-3333-4444-555555555555'
                    applicationNumber: 'APP-2026-0042'
                    status: Submitted
                    submittedDate: '2026-06-18T14:30:00Z'
                    citizenId: '12345678-1234-1234-1234-123456789012'
                    permitTypeId: '87654321-4321-4321-4321-210987654321'
                    citizenName: 'John Doe'
                    permitTypeName: 'Building Permit'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen']

  /api/applications/{id}/resubmit:
    post:
      tags: [Applications]
      summary: Resubmit application
      description: Resubmit an application after information request
      operationId: resubmitDraft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Application ID
      responses:
        '200':
          description: Application resubmitted successfully; status transitions from InfoRequested to Resubmitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationSummaryResponse'
              examples:
                applicationResubmitted:
                  summary: Resubmitted application response
                  value:
                    id: '11111111-2222-3333-4444-555555555555'
                    applicationNumber: 'APP-2026-0042'
                    status: Resubmitted
                    submittedDate: '2026-06-18T14:30:00Z'
                    citizenId: '12345678-1234-1234-1234-123456789012'
                    permitTypeId: '87654321-4321-4321-4321-210987654321'
                    citizenName: 'John Doe'
                    permitTypeName: 'Building Permit'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen']

  /api/applications/citizen/dashboard:
    get:
      tags: [Applications]
      summary: Get citizen dashboard
      description: Retrieve the current user's applications with status
      operationId: getCitizenDashboard
      responses:
        '200':
          description: Dashboard retrieved with the current citizen's applications (drafts and submitted)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationSummaryResponse'
              examples:
                citizenDashboard:
                  summary: Citizen dashboard applications list
                  value:
                    - id: '11111111-2222-3333-4444-555555555555'
                      applicationNumber: 'APP-2026-0042'
                      status: Submitted
                      submittedDate: '2026-06-18T14:30:00Z'
                      citizenId: '12345678-1234-1234-1234-123456789012'
                      permitTypeId: '87654321-4321-4321-4321-210987654321'
                      citizenName: 'John Doe'
                      permitTypeName: 'Building Permit'
                    - id: '22222222-3333-4444-5555-666666666666'
                      applicationNumber: 'APP-2026-0043'
                      status: Draft
                      submittedDate: null
                      citizenId: '12345678-1234-1234-1234-123456789012'
                      permitTypeId: '87654321-4321-4321-4321-210987654321'
                      citizenName: 'John Doe'
                      permitTypeName: 'Building Permit'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen']        

  /api/documents/{documentId}/download:
    get:
      tags: [Documents]
      summary: Download document
      description: Download a document from Azure Blob Storage
      operationId: downloadDocument
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Document ID
      responses:
        '200':
          description: Document file stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen', 'Officer', 'Admin']

  /api/permittypes:
    get:
      tags: [PermitTypes]
      summary: Get all permit types
      description: Retrieve list of permit types, optionally including inactive ones
      operationId: getPermitTypes
      parameters:
        - name: includeInactive
          in: query
          schema:
            type: boolean
            default: false
          description: Include inactive permit types in results
      responses:
        '200':
          description: List of permit types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PermitTypeSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen', 'Officer', 'Admin']
    
    post:
      tags: [PermitTypes]
      summary: Create permit type
      description: Create a new permit type
      operationId: createPermitType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermitTypeRequest'
      responses:
        '201':
          description: Permit type created successfully
          content:
            application/json:
              schema:
                type: string
                format: uuid
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Admin']

  /api/permittypes/{id}:
    get:
      tags: [PermitTypes]
      summary: Get permit type by ID
      description: Retrieve details of a specific permit type
      operationId: getPermitTypeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Permit type ID
      responses:
        '200':
          description: Permit type details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermitTypeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen', 'Officer', 'Admin']
    
    put:
      tags: [PermitTypes]
      summary: Update permit type
      description: Update an existing permit type
      operationId: updatePermitType
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Permit type ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermitTypeRequest'
      responses:
        '200':
          description: Permit type updated successfully
          content:
            application/json:
              schema:
                type: boolean
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Admin']
    
    delete:
      tags: [PermitTypes]
      summary: Deactivate permit type
      description: Deactivate a permit type (soft delete)
      operationId: deactivatePermitType
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Permit type ID
      responses:
        '200':
          description: Permit type deactivated successfully
          content:
            application/json:
              schema:
                type: boolean
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Admin']

  /api/permit-types/active:
    get:
      tags: [PermitTypes]
      summary: Get active permit types
      description: Retrieve all active permit types with field definitions
      operationId: getActivePermitTypes
      responses:
        '200':
          description: Active permit types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PermitTypeSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Citizen']        

  /api/users:
    get:
      tags: [Users]
      summary: Get all users
      description: Retrieve list of users with optional role filtering
      operationId: getUsers
      parameters:
        - name: role
          in: query
          schema:
            type: string
          description: Filter by user role
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Admin']

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: Retrieve details of a specific user
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User ID
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Admin']

  /api/auditlogs:
    get:
      tags: [AuditLogs]
      summary: Get audit logs
      description: Retrieve audit logs with optional filtering
      operationId: getAuditLogs
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by user ID
        - name: action
          in: query
          schema:
            type: string
          description: Filter by action type
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by date (from)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by date (to)
        - name: entityId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by entity ID
      responses:
        '200':
          description: List of audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Admin']

  /api/auditlogs/export:
    get:
      tags: [AuditLogs]
      summary: Export audit logs to CSV
      description: Export filtered audit logs to CSV format
      operationId: exportAuditLogs
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by user ID
        - name: action
          in: query
          schema:
            type: string
          description: Filter by action type
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by date (from)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by date (to)
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - EntraID: ['Admin']

components:
  schemas:
    ApplicationSummaryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '12345678-1234-1234-1234-123456789012'
        applicationNumber:
          type: string
          example: 'APP-2026-0001'
        status:
          type: string
          description: Application status
          enum: [Draft, Submitted, UnderReview, InfoRequested, Resubmitted, Approved, Rejected]
          example: Submitted
        submittedDate:
          type: string
          format: date-time
          nullable: true
        citizenId:
          type: string
          format: uuid
        permitTypeId:
          type: string
          format: uuid
        citizenName:
          type: string
          nullable: true
          example: 'John Doe'
        permitTypeName:
          type: string
          nullable: true
          example: 'Business Permit'
      required: [id, applicationNumber, status, citizenId, permitTypeId]
      
    ApplicationDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ApplicationSummaryResponse'
        - type: object
          properties:
            reviewedDate:
              type: string
              format: date-time
              nullable: true
              example: '2026-06-19T10:00:00Z'
            citizenNotes:
              type: string
              default: ''
              example: 'Building a new deck'
            officerNotes:
              type: string
              default: ''
              example: 'Application complete, all documents verified'
            documents:
              type: array
              items:
                $ref: '#/components/schemas/DocumentResponse'
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/ReviewResponse'
            officerName:
              type: string
              nullable: true
              example: 'Jane Smith'
            fieldValues:
              type: array
              items:
                $ref: '#/components/schemas/FieldValueResponse'              
          required: [citizenNotes, officerNotes, documents, reviews, fieldValues]
    
    DocumentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
          example: 'permit-application.pdf'
        contentType:
          type: string
          example: 'application/pdf'
        fileSize:
          type: integer
          format: int64
          example: 2048576
        blobUrl:
          type: string
          format: uri
          example: 'https://atlasstorage.blob.core.windows.net/documents/permit-application.pdf'
        uploadedDate:
          type: string
          format: date-time
        uploadedById:
          type: string
          format: uuid
      required: [id, fileName, contentType, fileSize, blobUrl, uploadedDate]
    
    ReviewResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        officerId:
          type: string
          format: uuid
        decision:
          type: string
          description: Review decision
          enum: [Approve, Reject, RequestInfo]
        reasonCode:
          type: string
          nullable: true
          example: 'INCOMPLETE_DOCUMENTATION'
        comments:
          type: string
          nullable: true
        reviewedDate:
          type: string
          format: date-time
        isVisibleToCitizen:
          type: boolean
          default: false
      required: [id, officerId, decision, reviewedDate, isVisibleToCitizen]
         
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          example: 'user@example.com'
        firstName:
          type: string
          example: 'John'
        lastName:
          type: string
          example: 'Doe'
        role:
          type: string
          example: 'Citizen'
        isActive:
          type: boolean
          default: true
      required: [id, email, firstName, lastName, role, isActive]
    
    AuditLogResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
          example: 'APPLICATION_SUBMITTED'
        entityType:
          type: string
          example: 'Application'
        entityId:
          type: string
          format: uuid
        details:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
        ipAddress:
          type: string
          example: '192.168.1.1'
      required: [id, action, entityType, entityId, timestamp]
    
    ProblemDetails:
      type: object
      properties:
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
      required: [title, status]
    
    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
          required: [errors]
    
    SubmitApplicationRequest:
      type: object
      properties:        
        permitTypeId:
          type: string
          format: uuid
        citizenNotes:
          type: string
          default: ''
      required: [permitTypeId]
    
    ApproveApplicationRequest:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid        
        comments:
          type: string
          default: ''
      required: [applicationId]
    
    RejectApplicationRequest:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid        
        reasonCode:
          type: string
        comments:
          type: string
          nullable: true
      required: [applicationId, reasonCode]
    
    RequestInfoRequest:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid        
        message:
          type: string        
      required: [applicationId, message]
    
    AssignToOfficerRequest:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid
        officerId:
          type: string
          format: uuid
      required: [applicationId, officerId]
    
    UploadDocumentRequest:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid
        fileName:
          type: string
        contentType:
          type: string
        fileSize:
          type: integer
          format: int64
        fileContent:
          type: string
          format: byte
          description: Base64-encoded file content
      required: [applicationId, fileName, contentType, fileSize, fileContent]
    
    CreatePermitTypeRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        fee:
          type: number
          format: decimal        
      required: [name, description, fee]
    
    UpdatePermitTypeRequest:
      type: object
      properties:
        permitTypeId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        fee:
          type: number
          format: decimal
        isActive:
          type: boolean
      required: [permitTypeId]  

    FieldValueRequest:
      type: object
      properties:
        fieldName:
          type: string
          example: ProjectTitle
        value:
          type: string
        sortOrder:
          type: integer
          format: int32
      required: [fieldName, value, sortOrder]

    FieldValueResponse:
      type: object
      properties:
        fieldName:
          type: string
          example: 'ProjectTitle'
        value:
          type: string
          example: 'Residential Deck Construction'
        sortOrder:
          type: integer
          example: 1
      required: [fieldName, value, sortOrder]         

    CreateDraftRequest:
      type: object
      properties:
        permitTypeId:
          type: string
          format: uuid
          example: '87654321-4321-4321-4321-210987654321'
        citizenNotes:
          type: string
          default: ''
          example: 'Building a new deck'
        fieldValues:
          type: array
          items:
            $ref: '#/components/schemas/FieldValueRequest'
          example:
            - fieldName: ProjectTitle
              value: 'Residential Deck Construction'
              sortOrder: 1
            - fieldName: PropertyAddress
              value: '123 Main St'
              sortOrder: 2
      required: [permitTypeId, fieldValues]

    UpdateDraftRequest:
      type: object
      properties:
        citizenNotes:
          type: string
          default: ''
          example: 'Updated: Building a new deck with permit drawings'
        fieldValues:
          type: array
          items:
            $ref: '#/components/schemas/FieldValueRequest'
          example:
            - fieldName: ProjectTitle
              value: 'Residential Deck Construction - Revised'
              sortOrder: 1
            - fieldName: PropertyAddress
              value: '123 Main St'
              sortOrder: 2
      required: [fieldValues]

    FieldDefinitionResponse:
      type: object
      properties:
        name:
          type: string
          example: 'ProjectTitle'
        type:
          type: string
          enum: [Text, MultilineText, Number, Date, Boolean, Dropdown]
          example: Text
        isRequired:
          type: boolean
          example: true
        defaultValue:
          type: string
          nullable: true
          example: null,
        options:
          type: array
          items:
            type: string
          example: ["Residential", "Commercial", "Industrial"]          
      required: [name, type, isRequired]

    PermitTypeSummaryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: 'Business Permit'
        description:
          type: string
          example: 'Permit for business operations'
        fee:
          type: number
          format: decimal
          example: 150.00
        isActive:
          type: boolean
          default: true
      required: [id, name, description, fee, isActive]      

    PermitTypeResponse:  
      allOf:
        - $ref: '#/components/schemas/PermitTypeSummaryResponse'
        - type: object
          properties:          
            fields:
              type: array
              items:
                $ref: '#/components/schemas/FieldDefinitionResponse'
          required: [id, name, description, fee, isActive, fields]      
  
  responses:
    Unauthorized:
      description: Unauthorized - Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationProblemDetails'
  
  securitySchemes:
    EntraID:
      type: openIdConnect
      openIdConnectUrl: https://login.microsoftonline.com/{tenantId}/v2.0/.well-known/openid-configuration
      description: >
        Microsoft Entra ID OAuth 2.0 authentication with OpenID Connect.
        Obtain a token from Microsoft Entra ID (https://login.microsoftonline.com/{tenantId}/oauth2/v2.0/authorize)
        using the Authorization Code flow, then include it in the Authorization header: "Bearer {token}"
